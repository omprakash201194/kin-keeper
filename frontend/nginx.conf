server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # reason: PWA manifest MUST be served as application/manifest+json — Android Chrome
    # silently drops installability when the MIME is application/octet-stream
    # (which is the nginx default for .webmanifest).
    types {
        application/manifest+json webmanifest;
    }

    # Don't cache the service worker or manifest — new deploys need to be picked up
    # on next visit without waiting on stale 304s.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://kin-keeper-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
