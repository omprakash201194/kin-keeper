server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # reason: PWA manifest MUST be served as application/manifest+json — Android Chrome
    # silently drops installability when the MIME is application/octet-stream (the
    # nginx default for unknown extensions).
    #
    # CRITICAL: include the built-in mime.types BEFORE adding the .webmanifest entry.
    # An unqualified `types { ... }` block REPLACES the entire mime map, so without
    # the include every non-listed extension falls through to application/octet-stream
    # and mobile browsers download the index.html instead of rendering it.
    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
        # reason: pdfjs-dist ships its worker as .mjs. Without an explicit
        # mapping nginx serves it as application/octet-stream, which Chrome's
        # strict MIME checking rejects for module scripts — PDF thumbnails
        # fall back to the in-thread "fake worker" with a console warning.
        text/javascript mjs;
    }

    # Don't cache the service worker, manifest, or the HTML shell — new deploys
    # need to be picked up on next visit without waiting on stale 304s, otherwise
    # installed PWAs stay stuck on an old bundle even after the SW auto-reload
    # logic lands (chicken-and-egg: the client has to *see* the new HTML to
    # know there's a reload to do).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location /api/ {
        proxy_pass http://kin-keeper-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
