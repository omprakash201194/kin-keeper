spring:
  application:
    name: kin-keeper
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
  cache:
    type: redis

server:
  port: 8080

logging:
  structured:
    format:
      console: ${LOG_FORMAT:}

firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

google:
  drive:
    application-name: kin-keeper

anthropic:
  default-model: claude-sonnet-4-6

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
