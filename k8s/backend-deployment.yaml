apiVersion: apps/v1
kind: Deployment
metadata:
  name: kin-keeper-backend
  namespace: homelab
  labels:
    app: kin-keeper-backend
    env: homelab
    managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kin-keeper-backend
  template:
    metadata:
      labels:
        app: kin-keeper-backend
        env: homelab
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: kin-keeper-backend
          # Image is updated by CI on each push to main:
          # localhost:30500/homelab/kin-keeper-backend:<sha>
          image: localhost:30500/homelab/kin-keeper-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kin-keeper-config
            - secretRef:
                name: kin-keeper-encryption-key
            - secretRef:
                name: kin-keeper-google-oauth
                optional: true
            - secretRef:
                name: redis-auth
            # reason: VAPID keys for web push. Optional so the deployment keeps
            # rolling before the SealedSecret is created; PushService reports
            # disabled until both env vars land. Generate with
            # scripts/generate-vapid.sh and seal into k8s/webpush-sealed-secret.yaml.
            - secretRef:
                name: kin-keeper-webpush
                optional: true
          volumeMounts:
            - name: firebase-credentials
              mountPath: /etc/firebase
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              # reason: Spring Boot + Firestore + Firebase JWT verify is CPU-bursty on
              # every request. A 500m cap caused ~40% CFS throttling on each API call,
              # stacking into multi-second waits. 2 cores lets bursts finish quickly;
              # the pod sits at ~10m steady state so the higher cap isn't a real cost.
              memory: "768Mi"
              cpu: "2000m"
      volumes:
        - name: firebase-credentials
          secret:
            secretName: kin-keeper-firebase
