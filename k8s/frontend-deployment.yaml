apiVersion: apps/v1
kind: Deployment
metadata:
  name: kin-keeper-frontend
  namespace: homelab
  labels:
    app: kin-keeper-frontend
    env: homelab
    managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kin-keeper-frontend
  template:
    metadata:
      labels:
        app: kin-keeper-frontend
        env: homelab
    spec:
      containers:
        - name: kin-keeper-frontend
          image: localhost:30500/homelab/kin-keeper-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
